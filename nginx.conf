server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compressione
  gzip on;
  gzip_types text/html text/css application/javascript application/json image/svg+xml text/plain;
  gzip_min_length 1024;

  # Asset con hash nel nome: cache lunga e immutabile
  location /_astro/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Header di sicurezza di base
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Pagine statiche (multilingua) con fallback 404 dedicato
  location / {
    try_files $uri $uri/index.html $uri.html =404;
  }

  error_page 404 /404.html;
}
